version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: reviewpilot-db
    environment:
      POSTGRES_USER: reviewpilot
      POSTGRES_PASSWORD: password
      POSTGRES_DB: reviewpilot_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: reviewpilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
