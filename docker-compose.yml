version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: reviewpilot-db
    environment:
      POSTGRES_USER: reviewpilot
      POSTGRES_PASSWORD: password
      POSTGRES_DB: reviewpilot_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: reviewpilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reviewpilot-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://reviewpilot:password@db:5432/reviewpilot_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-super-secret-key-change-in-prod
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reviewpilot-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
